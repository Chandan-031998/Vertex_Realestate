# Optional Nginx reverse proxy (example)
server {
  listen 80;
  server_name example.com;

  location /api/ {
    proxy_pass http://127.0.0.1:4000/api/;
  }

  location /uploads/ {
    proxy_pass http://127.0.0.1:4000/uploads/;
  }

  location / {
    root /var/www/vertex-frontend/dist;
    try_files $uri $uri/ /index.html;
  }
}
